<!DOCTYPE html>
<html>
<head>
<title>Simple Form</title>
<style>
body{
  font-family: Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:#f2f2f2;
}
form{
  background:white;
  padding:20px;
  border-radius:8px;
  box-shadow:0 0 10px gray;
}
input,button{
  width:100%;
  padding:8px;
  margin:5px 0;
}
button{
  background:red;
  color:white;
  border:none;
}
</style>
</head>
<body>

<form id="myForm">
  <h3>Register</h3>
  <input type="text" id="name" placeholder="Name" required>
  <input type="email" id="email" placeholder="Email" required>
  <button type="submit">Submit</button>
</form>

<script>
document.getElementById("myForm").onsubmit=function(e){
  e.preventDefault();
  alert("Form Submitted Successfully!");
};
</script>

</body>
</html>
