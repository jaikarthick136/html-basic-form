<!DOCTYPE html>
<html>
<head>
<title>Advanced Form</title>

<style>
body{
  font-family: Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:linear-gradient(135deg,#080808,#ffb347);
}

form{
  background:white;
  padding:25px;
  border-radius:10px;
  box-shadow:0 0 15px rgba(0,0,0,0.3);
  width:280px;
  text-align:center;
}

h3{
  margin-bottom:15px;
}

input,textarea,button{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:5px;
  border:1px solid #ccc;
}

textarea{
  resize:none;
  height:60px;
}

button{
  background:rgb(18, 18, 18);
  color:white;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  background:darkred;
}

.toggle{
  cursor:pointer;
  font-size:12px;
  color:blue;
}

#message{
  color:green;
  margin-top:10px;
  font-weight:bold;
}
</style>

</head>

<body>

<form id="myForm">

<h3>Register</h3>

<input type="text" id="name" placeholder="Name" required>

<input type="email" id="email" placeholder="Email" required>

<input type="date" id="dob" required>

<textarea id="about" placeholder="Tell about yourself"></textarea>

<input type="url" id="linkedin" placeholder="LinkedIn Profile Link">

<input type="password" id="password" placeholder="Password" required>

<span class="toggle" onclick="togglePassword()">Show Password</span>

<button type="submit">Submit</button>

<p id="message"></p>

</form>

<script>

function togglePassword(){
  var x=document.getElementById("password");
  if(x.type==="password"){
    x.type="text";
  }else{
    x.type="password";
  }
}

document.getElementById("myForm").onsubmit=function(e){

  e.preventDefault();

  var name=document.getElementById("name").value;

  if(name.length<3){
    alert("Name must be at least 3 characters");
    return;
  }

  document.getElementById("message").innerHTML="🎉 Form Submitted Successfully!";
};

</script>

</body>
</html>
